<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | login</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md bg-base-300 mx-auto">
    <div class="logo w-[200px] mx-auto pt-[210px]">
      <img src="assets/Logo-full.png" alt="" />
    </div>
    <div class="from pt-[32px]">
      <div
        class="card bg-[#F4F5F7] w-full max-w-sm shrink-0 shadow-2xl mx-auto rounded-2xl"
      >
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-neutral font-bold">Mobile Number</label>
            <input
            value="01994810914"
              type="text"
              maxlength="11"
              minlength="11"
              id="input-Number"
              class="input bg-[#FFFFFF] rounded-full"
              placeholder="Enter your number"
            />
            <label class="label text-neutral font-bold">4 Digit Pin</label>
            <input
              maxlength="4"
              minlength="4"
              id="input-pin"
              type="password"
              class="input bg-[#FFFFFF] rounded-full"
              placeholder="Enter 4 Digit Pin"
            />
            <button class="btn btn-neutral mt-4 rounded-full bg-[#3B25C1]" id="login-btn">
              Login
            </button>
          </fieldset>
        </div>
      </div>
    </div>
    <script src="./script/login.js"></script>
  </body>
</html>
